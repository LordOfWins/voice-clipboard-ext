<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 300px;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
        }

        h2 {
            color: #e94560;
            margin-top: 0;
        }

        p {
            font-size: 13px;
            line-height: 1.6;
        }

        .shortcut {
            background: #0f3460;
            padding: 4px 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
        }

        ul {
            padding-left: 18px;
            font-size: 13px;
        }

        li {
            margin-bottom: 6px;
        }
    </style>
</head>

<body>
    <h2>🎙️ Voice Clipboard</h2>
    <p>모든 웹사이트에서 음성을 텍스트로 변환하고 원클릭 복사!</p>
    <p><strong>사용법:</strong></p>
    <ul>
        <li>웹페이지 우측 하단의 패널에서 <b>🎤 시작</b> 클릭</li>
        <li>말하면 실시간으로 텍스트 표시</li>
        <li><b>📋 복사</b> 클릭하면 클립보드에 복사</li>
        <li>어디든 <b>Ctrl+V</b>로 붙여넣기</li>
    </ul>
    <p>단축키: <span class="shortcut">Ctrl+Shift+V</span> 로 녹음 토글</p>
    <p style="color:#888; font-size:11px; margin-top:16px;">v1.0.0 | Chrome Web Speech API 사용 (비용 없음)</p>
</body>

</html>
